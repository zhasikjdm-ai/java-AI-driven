<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - AI-Driven</title>
    <script src="supabase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .header p {
            color: #999;
            font-size: 0.95em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .password-requirements {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        
        .requirement {
            margin: 5px 0;
        }
        
        .requirement.met {
            color: #27ae60;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .footer {
            text-align: center;
            color: #999;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        
        .footer a:hover {
            color: #764ba2;
        }
        
        .error {
            background: #fadbd8;
            color: #e74c3c;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #e74c3c;
        }
        
        .success {
            background: #d5f4e6;
            color: #27ae60;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #27ae60;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Регистрация</h1>
            <p>Создайте новый аккаунт</p>
        </div>
        
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        
        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input 
                    type="text" 
                    id="username" 
                    required 
                    placeholder="username"
                >
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    required 
                    placeholder="your@email.com"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input 
                    type="password" 
                    id="password" 
                    required 
                    placeholder="••••••••"
                    oninput="checkPassword()"
                >
                <div class="password-requirements">
                    <div class="requirement" id="req-length">✓ Минимум 8 символов</div>
                    <div class="requirement" id="req-upper">✓ Заглавная буква</div>
                    <div class="requirement" id="req-number">✓ Цифра</div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirm">Подтверждение пароля</label>
                <input 
                    type="password" 
                    id="confirm" 
                    required 
                    placeholder="••••••••"
                >
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Зарегистрироваться</button>
            <div class="loading" id="loading">Загрузка...</div>
        </form>
        
        <div class="footer">
            Уже есть аккаунт? <a href="/login.html">Войти</a> | 
            <a href="/index.html">На главную</a>
        </div>
    </div>
    
    <script>
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const loadingDiv = document.getElementById('loading');
        
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
        }
        
        function showSuccess(msg) {
            successDiv.textContent = msg;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }
        
        function checkPassword() {
            const password = document.getElementById('password').value;
            const reqLength = document.getElementById('req-length');
            const reqUpper = document.getElementById('req-upper');
            const reqNumber = document.getElementById('req-number');
            
            reqLength.className = 'requirement ' + (password.length >= 8 ? 'met' : '');
            reqUpper.className = 'requirement ' + (/[A-Z]/.test(password) ? 'met' : '');
            reqNumber.className = 'requirement ' + (/\d/.test(password) ? 'met' : '');
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            
            if (!username || !email || !password || !confirm) {
                showError('Заполните все поля');
                return;
            }
            
            if (password !== confirm) {
                showError('Пароли не совпадают');
                return;
            }
            
            if (password.length < 8) {
                showError('Пароль должен быть минимум 8 символов');
                return;
            }
            
            loadingDiv.style.display = 'block';
            
            try {
                // Backend registration endpoint
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });
                
                if (!response.ok) {
                    throw new Error('Registration failed');
                }
                
                const data = await response.json();
                showSuccess('Регистрация успешна! Перенаправление...');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
                
            } catch (error) {
                showError('Ошибка при регистрации: ' + error.message);
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
