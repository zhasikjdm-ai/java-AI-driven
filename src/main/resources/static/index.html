<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Driven - Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }
        
        .nav-buttons a {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            font-size: 1em;
        }
        
        .nav-buttons a:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .chat-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            max-height: 250px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            background: white;
        }
        
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            word-wrap: break-word;
        }
        
        .message.user {
            background: #667eea;
            color: white;
            text-align: right;
            margin-left: 50px;
        }
        
        .message.ai {
            background: #e8eaf6;
            color: #333;
            margin-right: 50px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }
        
        .input-group button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: 0.3s;
        }
        
        .input-group button:hover {
            background: #764ba2;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #999;
            font-style: italic;
        }
        
        .error {
            color: #e74c3c;
            background: #fadbd8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI-Driven</h1>
            <p>Интеллектуальный чат-ассистент на базе Groq</p>
        </div>
        
        <div class="nav-buttons">
            <a href="/login.html">Вход</a>
            <a href="/register.html">Регистрация</a>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="chat-container">
            <div class="messages" id="messages"></div>
            <div class="loading" id="loading">Загрузка ответа...</div>
            <div class="input-group">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Напишите ваш вопрос..." 
                    onkeypress="handleKeyPress(event)"
                >
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>
    
    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            userInput.value = '';
            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            
            fetch('/api/ai/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                loadingDiv.style.display = 'none';
                addMessage(data.response || 'Нет ответа', false);
            })
            .catch(error => {
                loadingDiv.style.display = 'none';
                errorDiv.textContent = 'Ошибка: ' + error.message;
                errorDiv.style.display = 'block';
                console.error('Error:', error);
            });
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
        
        // Приветственное сообщение
        window.addEventListener('load', () => {
            addMessage('Привет! Я AI-ассистент. Чем я могу вам помочь?', false);
        });
    </script>
</body>
</html>
